<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomessenger Pro v5.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0e1621; color: #ffffff; font-family: sans-serif; user-select: none; }
        .tg-bg { background-color: #17212b; }
        .tg-active { background-color: #2b5278; }
        .tg-chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); opacity: 0.95; }
        .my-msg { background-color: #2b5278; align-self: flex-end; border-radius: 12px 12px 0px 12px; position: relative; }
        .other-msg { background-color: #182533; align-self: flex-start; border-radius: 12px 12px 12px 0px; position: relative; }
        .dropdown-menu { display: none; position: absolute; background-color: #17212b; border: 1px solid #101921; z-index: 100; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); }
        .dropdown-menu button { width: 100%; text-align: left; padding: 8px 16px; font-size: 13px; }
        .dropdown-menu button:hover { background-color: #24303f; }
        
        @media (max-width: 768px) {
            .sidebar-view { width: 100% !important; display: block; }
            .chat-view { width: 100% !important; display: none; position: fixed; inset: 0; z-index: 40; }
            .chat-view.active { display: flex !important; }
            .sidebar-view.hidden-mob { display: none !important; }
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden" onclick="closeAllDropdowns()">

    <div id="push-container" class="fixed top-4 right-4 z-50 flex flex-col space-y-2 pointer-events-none w-80"></div>

    <div id="auth-container" class="w-full max-w-md p-8 rounded-lg tg-bg shadow-lg z-10">
        <h2 id="auth-title" class="text-2xl font-bold text-center mb-6">Tomessenger Pro</h2>
        <div class="space-y-4">
            <input type="text" id="auth-name" placeholder="Adınız və Soyadınız" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white hidden">
            <input type="text" id="auth-phone" placeholder="Telefon nömrəniz" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white hidden">
            <input type="email" id="auth-email" placeholder="E-poçt ünvanı" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white">
            <input type="password" id="auth-password" placeholder="Şifrə" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white">
            <button id="btn-action" onclick="handleAuth()" class="w-full bg-[#2481cc] text-white p-3 rounded font-semibold">Giriş Et</button>
            <p class="text-sm text-center text-gray-400 mt-4">
                <span id="auth-switch-text">Hesabınız yoxdur?</span>
                <button onclick="toggleAuthMode()" id="btn-switch" class="text-[#40a7e3] underline ml-1">Qeydiyyatdan keçin</button>
            </p>
        </div>
    </div>

    <div id="app-container" class="w-full h-screen flex hidden">
        
        <div id="sidebar-panel" class="sidebar-view w-1/3 tg-bg border-r border-[#101921] flex flex-col h-full">
            <div class="p-4 flex justify-between items-center border-b border-[#101921]">
                <div class="flex items-center space-x-3">
                    <div id="my-avatar-txt" class="w-10 h-10 bg-[#2b5278] rounded-full flex items-center justify-center font-bold">U</div>
                    <span class="font-medium truncate max-w-[120px]" id="my-name">Yüklənir...</span>
                </div>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500"><i class="fas fa-sign-out-alt text-lg"></i></button>
            </div>
            
            <div class="flex-1 overflow-y-auto" id="chats-list">
                <div onclick="startGlobalGroupChat()" class="p-3 flex items-center space-x-3 hover:bg-[#24303f] cursor-pointer border-b border-[#101921] bg-[#1a2c3d]">
                    <div class="w-10 h-10 bg-[#e07a5f] rounded-full flex items-center justify-center font-bold text-white"><i class="fas fa-globe"></i></div>
                    <div class="flex-1">
                        <h4 class="font-bold text-sm text-white">Ümumdünya Kömək Qrupu</h4>
                        <p class="text-xs text-gray-400 truncate">Açıq dəstək otağı</p>
                    </div>
                </div>
                <div id="all-users-list"></div>
            </div>
        </div>

        <div id="chat-panel" class="chat-view flex-1 flex flex-col bg-[#0e1621] relative tg-chat-bg">
            <div id="no-chat-selected" class="absolute inset-0 flex items-center justify-center bg-[#0e1621] z-20 flex">
                <p class="bg-[#182533] px-4 py-2 rounded-full text-sm text-gray-400">Yazışmaq üçün bir çat seçin</p>
            </div>

            <div class="p-4 tg-bg flex items-center justify-between border-b border-[#101921] z-10">
                <div class="flex items-center">
                    <button onclick="backToSidebar()" class="md:hidden mr-3 text-gray-400 hover:text-white"><i class="fas fa-arrow-left text-lg"></i></button>
                    <div id="active-chat-avatar" class="w-10 h-10 bg-[#40a7e3] rounded-full flex items-center justify-center font-bold mr-3">?</div>
                    <div>
                        <h3 class="font-bold text-base" id="active-chat-title">Çat</h3>
                        <p class="text-xs text-gray-400" id="active-chat-status">Söhbət otağı</p>
                    </div>
                </div>
                <div class="relative">
                    <button onclick="toggleChatDropdown(event)" class="text-gray-400 hover:text-white p-2"><i class="fas fa-ellipsis-v text-lg"></i></button>
                    <div id="chat-dropdown" class="dropdown-menu right-0 mt-2 w-48">
                        <button onclick="handleBlockActions()" id="block-btn" class="text-yellow-500"><i class="fas fa-ban mr-2"></i>Blokla</button>
                        <button onclick="deleteCurrentChat()" class="text-red-500"><i class="fas fa-trash mr-2"></i>Çatı Sil</button>
                    </div>
                </div>
            </div>

            <div id="messages-container" class="flex-1 p-6 overflow-y-auto flex flex-col space-y-3 z-10"></div>

            <div id="ban-overlay" class="p-3 bg-red-900 bg-opacity-80 text-center text-sm font-bold text-white hidden z-20">
                ⚠️ Spam etdiyiniz üçün 1 saatlıq BAN olundunuz! Qalan vaxt: <span id="ban-timer">60:00</span>
            </div>

            <div id="reply-preview" class="px-4 py-2 bg-[#182533] border-l-4 border-[#40a7e3] flex justify-between items-center hidden z-10">
                <div>
                    <p class="text-xs text-[#40a7e3] font-bold">Cavablandırılır:</p>
                    <p id="reply-preview-text" class="text-xs text-gray-400 truncate max-w-md"></p>
                </div>
                <button onclick="cancelReply()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>

            <form id="message-form" onsubmit="sendMessage(event)" class="p-4 tg-bg flex items-center space-x-3 z-10">
                <input type="text" id="msg-input" placeholder="Mesaj yazın..." autocomplete="off" class="flex-1 p-3 rounded-lg bg-[#24303f] text-white focus:outline-none">
                <button type="submit" id="send-btn" class="w-12 h-12 bg-[#2b5278] hover:bg-[#2481cc] rounded-full flex items-center justify-center text-white transition">
                    <i class="fas fa-paper-plane" id="send-icon"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="message-dropdown" class="dropdown-menu w-36">
        <button onclick="triggerEditMessage()"><i class="fas fa-edit mr-2 text-blue-400"></i>Dəyişdir</button>
        <button onclick="deleteMessage()"><i class="fas fa-trash mr-2 text-red-500"></i>Sil</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBphHHmIBl0vNONV7XYIrCcSRM0uBTIors",
            authDomain: "tomessanger.firebaseapp.com",
            projectId: "tomessanger",
            storageBucket: "tomessanger.firebasestorage.app",
            messagingSenderId: "542418746391",
            appId: "1:542418746391:web:0bbbb96a1d5bc465dfb052"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isSignUpMode = false;
        let currentUser = null;
        let userData = { name: "", blockedUsers: [], deletedChats: [], banUntil: null };
        let activeChatId = null;
        let activeChatType = "private"; 
        let targetUserData = null;
        let unsubscribeMessages = null;
        
        let repliedMessageId = null;
        let selectedMessageId = null;
        let isEditingMode = false;

        let messageTimestamps = [];
        let banEndTime = null;
        let allUsersMap = {};

        window.toggleAuthMode = function() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? "Qeydiyyat" : "Tomessenger Pro";
            document.getElementById('auth-name').classList.toggle('hidden', !isSignUpMode);
            document.getElementById('auth-phone').classList.toggle('hidden', !isSignUpMode);
            document.getElementById('btn-action').innerText = isSignUpMode ? "Qeydiyyatı Tamamla" : "Giriş Et";
        }

        // QEYDİYYAT XƏTASININ HƏLLİ: Boş verilənlər Firebase üçün təhlükəsiz formata salındı
        window.handleAuth = async function() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const name = document.getElementById('auth-name').value.trim();
            const phone = document.getElementById('auth-phone').value.trim();

            if(!email || !password) return alert("Məlumatları doldurun!");

            try {
                if (isSignUpMode) {
                    if(!name) return alert("Zəhmət olmasa adınızı daxil edin!");
                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    
                    // Struktur tam sadələşdirildi ki Firebase rədd etməsin
                    await setDoc(doc(db, "users", res.user.uid), {
                        uid: res.user.uid,
                        name: name,
                        email: email,
                        phone: phone || "",
                        blockedUsers: [],
                        deletedChats: [],
                        banUntil: null
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (e) { alert(e.message); }
        }

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const d = await getDoc(doc(db, "users", user.uid));
                
                // Əgər bazadan gələn məlumatda massivlər yoxdursa avtomatik təyin et (Crash-ın qarşısını alır)
                const data = d.data() || {};
                userData = {
                    uid: user.uid,
                    name: data.name || "İstifadəçi",
                    email: data.email || "",
                    phone: data.phone || "",
                    blockedUsers: data.blockedUsers || [],
                    deletedChats: data.deletedChats || [],
                    banUntil: data.banUntil || null
                };
                
                if(userData.banUntil && userData.banUntil > Date.now()) {
                    activateBanSystem(userData.banUntil);
                }

                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('my-name').innerText = userData.name;
                document.getElementById('my-avatar-txt').innerText = userData.name.charAt(0).toUpperCase();
                
                loadUsersAndSync();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        async function loadUsersAndSync() {
            const usersSnap = await getDocs(collection(db, "users"));
            allUsersMap = {}; // Keşi sıfırla
            usersSnap.forEach(docSnap => {
                const u = docSnap.data();
                allUsersMap[u.uid] = u;
            });

            onSnapshot(collection(db, "users"), (snapshot) => {
                snapshot.forEach(docSnap => {
                    const u = docSnap.data();
                    allUsersMap[u.uid] = u; // Yeni qeydiyyatdan keçənləri də xəritəyə daxil et
                });
                renderSidebarList();
            });
        }

        function renderSidebarList() {
            const container = document.getElementById('all-users-list');
            container.innerHTML = "";

            Object.values(allUsersMap).forEach(user => {
                if(user.uid === currentUser.uid) return;

                const roomDeterministicId = currentUser.uid < user.uid ? `${currentUser.uid}_${user.uid}` : `${user.uid}_${currentUser.uid}`;
                if(userData.deletedChats && userData.deletedChats.includes(roomDeterministicId)) return;

                const div = document.createElement('div');
                div.id = `sid-${user.uid}`;
                div.className = "p-3 flex items-center space-x-3 hover:bg-[#24303f] cursor-pointer border-b border-[#101921]";
                
                div.onclick = () => {
                    startPrivateChat(user);
                };

                div.innerHTML = `
                    <div class="w-10 h-10 bg-[#2b5278] rounded-full flex items-center justify-center font-bold text-white">${(user.name || "U").charAt(0).toUpperCase()}</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center">
                            <h4 class="font-semibold text-sm text-white">${user.name}</h4>
                            <span id="badge-${user.uid}" class="text-xs text-blue-400 font-bold"></span>
                        </div>
                        <p class="text-xs text-gray-400 truncate" id="last-msg-${user.uid}">Söhbət etmək üçün klikləyin</p>
                    </div>
                `;
                container.appendChild(div);
            });
            
            listenForGlobalNotifications();
        }

        window.backToSidebar = function() {
            document.getElementById('chat-panel').classList.remove('active');
            document.getElementById('sidebar-panel').classList.remove('hidden-mob');
        }

        window.startPrivateChat = function(targetUser) {
            if(!targetUser) return;
            targetUserData = targetUser;
            activeChatType = "private";
            activeChatId = currentUser.uid < targetUser.uid ? `${currentUser.uid}_${targetUser.uid}` : `${targetUser.uid}_${currentUser.uid}`;
            
            document.getElementById('chat-panel').classList.add('active');
            document.getElementById('sidebar-panel').classList.add('hidden-mob');
            document.getElementById('no-chat-selected').classList.add('hidden');

            document.getElementById('active-chat-title').innerText = targetUser.name;
            document.getElementById('active-chat-status').innerText = "şəxsi söhbət";
            document.getElementById('active-chat-avatar').innerText = (targetUser.name || "?").charAt(0).toUpperCase();

            const isBlocked = userData.blockedUsers && userData.blockedUsers.includes(targetUserData.uid);
            document.getElementById('block-btn').innerHTML = isBlocked ? `<i class="fas fa-unlock mr-2"></i>Blokdan Çıxart` : `<i class="fas fa-ban mr-2"></i>Blokla`;

            listenMessages();
        }

        window.startGlobalGroupChat = function() {
            activeChatType = "global";
            activeChatId = "global_main_help_room";
            
            document.getElementById('chat-panel').classList.add('active');
            document.getElementById('sidebar-panel').classList.add('hidden-mob');
            document.getElementById('no-chat-selected').classList.add('hidden');
            
            document.getElementById('active-chat-title').innerText = "Ümumdünya Kömək Qrupu";
            document.getElementById('active-chat-status').innerText = "Hər kəs yazıla bilər";
            document.getElementById('active-chat-avatar').innerHTML = `<i class="fas fa-globe"></i>`;
            listenMessages();
        }

        function listenMessages() {
            if(!activeChatId) return;
            if(unsubscribeMessages) unsubscribeMessages();
            
            const q = query(collection(db, "rooms", activeChatId, "messages"), orderBy("timestamp", "asc"));
            
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";

                snapshot.forEach(docSnap => {
                    const msg = docSnap.data();
                    const isMe = msg.senderUid === currentUser.uid;

                    if(userData.blockedUsers && userData.blockedUsers.includes(msg.senderUid)) return;

                    if(!isMe && msg.status !== "read") {
                        updateDoc(doc(db, "rooms", activeChatId, "messages", docSnap.id), { status: "read" });
                    }

                    const div = document.createElement('div');
                    div.className = `max-w-xs md:max-w-md p-3 shadow-md text-sm cursor-context-menu ${isMe ? 'my-msg' : 'other-msg'}`;
                    div.oncontextmenu = (e) => openMessageMenu(e, docSnap.id, msg.text, isMe);
                    
                    let replyHTML = "";
                    if(msg.replyToText) {
                        replyHTML = `<div class="bg-black bg-opacity-20 p-2 rounded text-xs mb-1 border-l-2 border-white opacity-70 italic truncate">${msg.replyToText}</div>`;
                    }

                    let ticks = "";
                    if(isMe) {
                        ticks = msg.status === "read" 
                            ? `<span class="text-blue-400 ml-2 text-[11px] font-bold"><i class="fas fa-check-double"></i></span>` 
                            : `<span class="text-gray-400 ml-2 text-[11px]"><i class="fas fa-check"></i></span>`;
                    }

                    div.innerHTML = `
                        <div class="flex justify-between items-center space-x-4">
                            <span class="text-[11px] text-[#40a7e3] font-bold">${isMe ? "Sən" : msg.senderName}</span>
                            <button onclick="replyTo('${docSnap.id}', '${msg.text.replace(/'/g, "\\'")}')" class="text-gray-400 hover:text-white text-xs"><i class="fas fa-reply"></i></button>
                        </div>
                        ${replyHTML}
                        <p class="break-words mt-1 flex justify-between items-end">
                            <span>${msg.text} ${msg.isEdited ? '<span class="text-[9px] text-gray-400 ml-1">(edit)</span>' : ''}</span>
                            ${ticks}
                        </p>
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        function checkSpamProtection() {
            const now = Date.now();
            messageTimestamps.push(now);
            messageTimestamps = messageTimestamps.filter(ts => now - ts < 3000);

            if(messageTimestamps.length >= 10) {
                const oneHour = 60 * 60 * 1000;
                banEndTime = now + oneHour;
                updateDoc(doc(db, "users", currentUser.uid), { banUntil: banEndTime });
                activateBanSystem(banEndTime);
                return false;
            }
            return true;
        }

        function activateBanSystem(untilTime) {
            document.getElementById('msg-input').disabled = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('ban-overlay').classList.remove('hidden');

            const timer = setInterval(() => {
                const timeLeft = untilTime - Date.now();
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById('msg-input').disabled = false;
                    document.getElementById('send-btn').disabled = false;
                    document.getElementById('ban-overlay').classList.add('hidden');
                    updateDoc(doc(db, "users", currentUser.uid), { banUntil: null });
                } else {
                    const minutes = Math.floor(timeLeft / 60000);
                    const seconds = Math.floor((timeLeft % 60000) / 1000);
                    document.getElementById('ban-timer').innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                }
            }, 1000);
        }

        function showPushNotification(sender, text) {
            const container = document.getElementById('push-container');
            const toast = document.createElement('div');
            toast.className = "p-4 bg-[#17212b] border-l-4 border-blue-500 rounded shadow-2xl pointer-events-auto flex flex-col space-y-1 transition opacity duration-300";
            toast.innerHTML = `
                <p class="text-xs text-blue-400 font-bold"><i class="fas fa-bell mr-1"></i> Yeni Mesaj</p>
                <p class="text-sm font-semibold text-white">${sender}</p>
                <p class="text-xs text-gray-300 truncate">${text}</p>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function listenForGlobalNotifications() {
            onSnapshot(collection(db, "rooms"), (snapshot) => {
                snapshot.docChanges().forEach(change => {
                    const roomId = change.doc.id;
                    if(roomId.includes(currentUser.uid) && roomId !== activeChatId) {
                        if(userData.deletedChats && userData.deletedChats.includes(roomId)) {
                            userData.deletedChats = userData.deletedChats.filter(id => id !== roomId);
                            updateDoc(doc(db, "users", currentUser.uid), { deletedChats: userData.deletedChats });
                            renderSidebarList();
                        }

                        const subQ = query(collection(db, "rooms", roomId, "messages"), orderBy("timestamp", "desc"));
                        getDocs(subQ).then(messagesSnap => {
                            if(!messagesSnap.empty) {
                                const lastMsg = messagesSnap.docs[0].data();
                                if(lastMsg.senderUid !== currentUser.uid && lastMsg.status !== "read") {
                                    showPushNotification(lastMsg.senderName, lastMsg.text);
                                    const el = document.getElementById(`last-msg-${lastMsg.senderUid}`);
                                    if(el) el.innerText = lastMsg.text;
                                }
                            }
                        });
                    }
                });
            });
        }

        window.sendMessage = async function(e) {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !activeChatId) return;

            if(!checkSpamProtection()) return;

            if(activeChatType === "private" && targetUserData && targetUserData.blockedUsers && targetUserData.blockedUsers.includes(currentUser.uid)) {
                alert("Bu istifadəçiyə mesaj göndərə bilməzsiniz (Sizi bloklayıb).");
                return;
            }

            if(isEditingMode) {
                await updateDoc(doc(db, "rooms", activeChatId, "messages", selectedMessageId), { text: text, isEdited: true });
                cancelEdit();
            } else {
                let payload = {
                    text: text, senderUid: currentUser.uid, senderName: userData.name || "Anonim", timestamp: serverTimestamp(), status: "sent"
                };
                if(repliedMessageId) {
                    payload.replyToId = repliedMessageId;
                    payload.replyToText = document.getElementById('reply-preview-text').innerText;
                }
                await addDoc(collection(db, "rooms", activeChatId, "messages"), payload);
                cancelReply();
            }
            input.value = "";
        }

        window.replyTo = function(id, text) {
            repliedMessageId = id;
            document.getElementById('reply-preview').classList.remove('hidden');
            document.getElementById('reply-preview-text').innerText = text;
        }
        window.cancelReply = function() {
            repliedMessageId = null;
            document.getElementById('reply-preview').classList.add('hidden');
        }

        function openMessageMenu(e, msgId, currentText, isMe) {
            e.preventDefault();
            if(!isMe) return; 
            selectedMessageId = msgId;
            window.tempMsgText = currentText;

            const menu = document.getElementById('message-dropdown');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        window.triggerEditMessage = function() {
            isEditingMode = true;
            document.getElementById('msg-input').value = window.tempMsgText;
            document.getElementById('send-icon').className = "fas fa-check";
        }

        function cancelEdit() {
            isEditingMode = false;
            document.getElementById('send-icon').className = "fas fa-paper-plane";
        }

        window.deleteMessage = async function() {
            if(confirm("Mesajı silmək istəyirsiniz?")) {
                await deleteDoc(doc(db, "rooms", activeChatId, "messages", selectedMessageId));
            }
        }
