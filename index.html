<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netto Messenger</title>
    <!-- Sadə və müasir görünüş üçün Tailwind CSS istifadə edirik -->
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <!-- 1. Giriş Ekranı (Login) -->
    <div id="login-screen" class="flex-1 flex flex-col justify-center items-center p-4">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-4 text-center text-blue-600">Netto Messenger</h2>
            <input id="username" type="text" placeholder="İstifadəçi adınız..." class="w-full p-2 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="startApp()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">Daxil Ol</button>
        </div>
    </div>

    <!-- 2. Əsas Messencer Ekranı (Girişdən sonra açılır) -->
    <div id="main-screen" class="hidden flex-1 flex h-full overflow-hidden">
        
        <!-- Sol Panel: Dostlar və Qruplar -->
        <div class="w-1/3 bg-white border-r flex flex-col">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <span id="user-display" class="font-bold text-gray-700"></span>
                <button onclick="createNewGroup()" class="bg-green-500 text-white text-xs px-2 py-1 rounded hover:bg-green-600">+ Yeni Qrup</button>
            </div>
            <!-- Siyahılar -->
            <div class="flex-1 overflow-y-auto p-2 space-y-2">
                <h3 class="text-xs font-semibold text-gray-500 px-2 uppercase">Söhbətlər</h3>
                <div id="chat-list" class="space-y-1">
                    <!-- Aktiv söhbətlər (Qruplar və ya Dostlar) bura gələcək -->
                    <button onclick="switchChat('Ümumi Qrup')" class="w-full text-left p-2 rounded bg-blue-50 font-medium text-sm">🌐 Ümumi Qrup</button>
                </div>
            </div>
        </div>

        <!-- Sağ Panel: Yazışma Sahəsi -->
        <div class="w-2/3 flex flex-col bg-gray-50">
            <!-- Söhbət Başlığı -->
            <div class="p-4 bg-white border-b shadow-sm">
                <h2 id="current-chat-title" class="font-bold text-gray-800">🌐 Ümumi Qrup</h2>
            </div>

            <!-- Mesajların Siyahısı -->
            <div id="messages-container" class="flex-1 p-4 overflow-y-auto space-y-3">
                <!-- Mesaj nümunəsi -->
                <div class="flex flex-col items-start">
                    <span class="text-xs text-gray-500 ml-1">Sistem</span>
                    <div class="bg-white p-2 rounded-lg shadow-sm text-sm max-w-xs">Netto-ya xoş gəlmisiniz! Söhbətə başlayın.</div>
                </div>
            </div>

            <!-- Mesaj Göndərmə Hissəsi -->
            <div class="p-4 bg-white border-t flex gap-2">
                <input id="message-input" type="text" placeholder="Mesaj yazın..." class="flex-1 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="sendMessage()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Göndər</button>
            </div>
        </div>

    </div>

    <!-- MƏNTİQ VƏ JAVASCRIPT HİSSƏSİ -->
    <script>
        let currentUser = "";
        let currentChat = "Ümumi Qrup";

        // Giriş funksiyası
        function startApp() {
            const usernameInput = document.getElementById('username').value.trim();
            if(!usernameInput) return alert("Zəhmət olmasa ad yazın!");
            
            currentUser = usernameInput;
            document.getElementById('user-display').innerText = "👤 " + currentUser;
            
            // Ekranları dəyişdiririk
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }

        // Söhbəti dəyişmək (Dost və ya Qrup)
        function switchChat(chatName) {
            currentChat = chatName;
            document.getElementById('current-chat-title').innerText = chatName;
            document.getElementById('messages-container').innerHTML = ""; // Köhnə mesajları təmizlə
        }

        // Yeni qrup yaratmaq (Simulyasiya)
        function createNewGroup() {
            const groupName = prompt("Qrupun adını daxil edin:");
            if(!groupName) return;
            
            const chatList = document.getElementById('chat-list');
            const newBtn = document.createElement('button');
            newBtn.className = "w-full text-left p-2 rounded hover:bg-gray-100 text-sm font-medium";
            newBtn.innerText = "👥 " + groupName;
            newBtn.onclick = () => switchChat("👥 " + groupName);
            chatList.appendChild(newBtn);
        }

        // Mesaj göndərmək
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if(!text) return;

            const container = document.getElementById('messages-container');
            
            // Yeni mesaj elementini ekrana əlavə edirik
            const msgDiv = document.createElement('div');
            msgDiv.className = "flex flex-col items-end"; // İstifadəçinin öz mesajları sağda
            msgDiv.innerHTML = `
                <span class="text-xs text-gray-500 mr-1">Mən (${currentUser})</span>
                <div class="bg-blue-500 text-white p-2 rounded-lg shadow-sm text-sm max-w-xs">${text}</div>
            `;
            
            container.appendChild(msgDiv);
            input.value = ""; // Giriş sahəsini təmizlə
            container.scrollTop = container.scrollHeight; // Avtomatik aşağı sürüşdür
            
            // QEYD: Tam real-time işləməsi üçün bura Firebase verilənlər bazası qoşulmalıdır.
        }
    </script>
</body>
</html>
