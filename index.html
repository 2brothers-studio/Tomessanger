<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomessenger Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0e1621; color: #ffffff; font-family: sans-serif; user-select: none; }
        .tg-bg { background-color: #17212b; }
        .tg-active { background-color: #2b5278; }
        .tg-chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); opacity: 0.95; }
        .my-msg { background-color: #2b5278; align-self: flex-end; border-radius: 12px 12px 0px 12px; position: relative; }
        .other-msg { background-color: #182533; align-self: flex-start; border-radius: 12px 12px 12px 0px; position: relative; }
        .dropdown-menu { display: none; position: absolute; background-color: #17212b; border: 1px solid #101921; z-index: 100; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); }
        .dropdown-menu button { width: 100%; text-align: left; padding: 8px 16px; font-size: 13px; }
        .dropdown-menu button:hover { background-color: #24303f; }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden" onclick="closeAllDropdowns()">

    <!-- 1. GİRİŞ VƏ QEYDİYYAT -->
    <div id="auth-container" class="w-full max-w-md p-8 rounded-lg tg-bg shadow-lg z-10">
        <h2 id="auth-title" class="text-2xl font-bold text-center mb-6">Tomessenger Pro</h2>
        <div class="space-y-4">
            <input type="text" id="auth-name" placeholder="Adınız və Soyadınız" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white hidden">
            <input type="text" id="auth-phone" placeholder="Telefon nömrəniz (Məs: +994501234567)" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white hidden">
            <input type="email" id="auth-email" placeholder="E-poçt ünvanı" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white">
            <input type="password" id="auth-password" placeholder="Şifrə" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white">
            <button id="btn-action" onclick="handleAuth()" class="w-full bg-[#2481cc] text-white p-3 rounded font-semibold">Giriş Et</button>
            <p class="text-sm text-center text-gray-400 mt-4">
                <span id="auth-switch-text">Hesabınız yoxdur?</span>
                <button onclick="toggleAuthMode()" id="btn-switch" class="text-[#40a7e3] underline ml-1">Qeydiyyatdan keçin</button>
            </p>
        </div>
    </div>

    <!-- 2. ƏSAS MESSENCER EKRANI -->
    <div id="app-container" class="w-full h-screen flex hidden">
        
        <!-- Sol Panel -->
        <div class="w-1/3 tg-bg border-r border-[#101921] flex flex-col h-full">
            <div class="p-4 flex justify-between items-center border-b border-[#101921]">
                <div class="flex items-center space-x-3">
                    <div id="my-avatar-txt" class="w-10 h-10 bg-[#2b5278] rounded-full flex items-center justify-center font-bold">U</div>
                    <span class="font-medium truncate max-w-[120px]" id="my-name">Yüklənir...</span>
                </div>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500"><i class="fas fa-sign-out-alt text-lg"></i></button>
            </div>
            
            <!-- Axtarış Bölməsi (İnsanları ancaq buradan tapmaq olar) -->
            <div class="p-3 border-b border-[#101921]">
                <div class="relative flex items-center bg-[#24303f] rounded-lg px-3 py-2">
                    <i class="fas fa-search text-gray-400 mr-2 text-sm"></i>
                    <input type="text" id="search-input" placeholder="Ad və ya E-poçt ilə dostunu tap..." class="bg-transparent text-sm text-white w-full focus:outline-none">
                    <button onclick="searchUser()" class="text-xs bg-[#2481cc] px-2 py-1 rounded ml-1">Tap</button>
                </div>
            </div>
            
            <!-- Çat Siyahısı -->
            <div class="flex-1 overflow-y-auto" id="chats-list">
                <!-- Qlobal Kömək Qrupu (Sabit) -->
                <div onclick="startGlobalGroupChat()" class="p-3 flex items-center space-x-3 hover:bg-[#24303f] cursor-pointer border-b border-[#101921] bg-[#1a2c3d]">
                    <div class="w-10 h-10 bg-[#e07a5f] rounded-full flex items-center justify-center font-bold text-white"><i class="fas fa-globe"></i></div>
                    <div class="flex-1">
                        <h4 class="font-bold text-sm text-white">Ümumdünya Kömək Qrupu</h4>
                        <p class="text-xs text-gray-400 truncate">Hər kəs üçün açıq dəstək otağı</p>
                    </div>
                </div>
                <div id="found-chats"></div>
            </div>
        </div>

        <!-- Sağ Panel -->
        <div class="flex-1 flex flex-col bg-[#0e1621] relative tg-chat-bg">
            <div id="no-chat-selected" class="absolute inset-0 flex items-center justify-center bg-[#0e1621] z-20">
                <p class="bg-[#182533] px-4 py-2 rounded-full text-sm text-gray-400">Yazışmaq üçün bir çat seçin və ya axtarış edin</p>
            </div>

            <!-- Çat Başlığı və 3 nöqtə menyusu -->
            <div class="p-4 tg-bg flex items-center justify-between border-b border-[#101921] z-10">
                <div class="flex items-center">
                    <div id="active-chat-avatar" class="w-10 h-10 bg-[#40a7e3] rounded-full flex items-center justify-center font-bold mr-3">?</div>
                    <div>
                        <h3 class="font-bold text-base" id="active-chat-title">Çat</h3>
                        <p class="text-xs text-gray-400" id="active-chat-status">onlayn</p>
                    </div>
                </div>
                <div class="relative">
                    <button onclick="toggleChatDropdown(event)" class="text-gray-400 hover:text-white p-2"><i class="fas fa-ellipsis-v text-lg"></i></button>
                    <div id="chat-dropdown" class="dropdown-menu right-0 mt-2 w-48">
                        <button onclick="handleBlockActions()" id="block-btn" class="text-yellow-500"><i class="fas fa-ban mr-2"></i>Blokla</button>
                        <button onclick="deleteCurrentChat()" class="text-red-500"><i class="fas fa-trash mr-2"></i>Çatı Sil</button>
                    </div>
                </div>
            </div>

            <!-- Mesajlar Sahəsi -->
            <div id="messages-container" class="flex-1 p-6 overflow-y-auto flex flex-col space-y-3 z-10"></div>

            <!-- Cavablama Paneli (Gizli) -->
            <div id="reply-preview" class="px-4 py-2 bg-[#182533] border-l-4 border-[#40a7e3] flex justify-between items-center hidden z-10">
                <div>
                    <p class="text-xs text-[#40a7e3] font-bold">Cavablandırılır:</p>
                    <p id="reply-preview-text" class="text-xs text-gray-400 truncate max-w-md"></p>
                </div>
                <button onclick="cancelReply()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>

            <!-- Mesaj Giriş Paneli -->
            <form id="message-form" onsubmit="sendMessage(event)" class="p-4 tg-bg flex items-center space-x-3 z-10">
                <input type="text" id="msg-input" placeholder="Mesaj yazın..." autocomplete="off" class="flex-1 p-3 rounded-lg bg-[#24303f] text-white focus:outline-none">
                <button type="submit" id="send-btn" class="w-12 h-12 bg-[#2b5278] hover:bg-[#2481cc] rounded-full flex items-center justify-center text-white transition">
                    <i class="fas fa-paper-plane" id="send-icon"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Mesaj üçün Kontekst Menyusu (Silmə / Dəyişmə) -->
    <div id="message-dropdown" class="dropdown-menu w-36">
        <button onclick="triggerEditMessage()"><i class="fas fa-edit mr-2 text-blue-400"></i>Dəyişdir</button>
        <button onclick="deleteMessage()"><i class="fas fa-trash mr-2 text-red-500"></i>Sil</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBphHHmIBl0vNONV7XYIrCcSRM0uBTIors",
            authDomain: "tomessanger.firebaseapp.com",
            projectId: "tomessanger",
            storageBucket: "tomessanger.firebasestorage.app",
            messagingSenderId: "542418746391",
            appId: "1:542418746391:web:0bbbb96a1d5bc465dfb052"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isSignUpMode = false;
        let currentUser = null;
        let userData = null;
        let activeChatId = null;
        let activeChatType = "private"; // 'private' və ya 'global'
        let targetUserData = null;
        let unsubscribeMessages = null;
        
        let repliedMessageId = null;
        let selectedMessageId = null;
        let isEditingMode = false;

        // Form rejimləri keçidi
        window.toggleAuthMode = function() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? "Qeydiyyat" : "Tomessenger Pro";
            document.getElementById('auth-name').classList.toggle('hidden', !isSignUpMode);
            document.getElementById('auth-phone').classList.toggle('hidden', !isSignUpMode);
            document.getElementById('btn-action').innerText = isSignUpMode ? "Qeydiyyatı Tamamla" : "Giriş Et";
        }

        window.handleAuth = async function() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const name = document.getElementById('auth-name').value.trim();
            const phone = document.getElementById('auth-phone').value.trim();

            if(!email || !password) return alert("Məlumatları doldurun!");

            try {
                if (isSignUpMode) {
                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "users", res.user.uid), {
                        uid: res.user.uid, name: name, email: email, phone: phone, blockedUsers: []
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (e) { alert(e.message); }
        }

        window.logout = () => signOut(auth);

        // İstifadəçi girişi və Kontaktların yoxlanması
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const d = await getDoc(doc(db, "users", user.uid));
                userData = d.data();
                if(!userData.blockedUsers) userData.blockedUsers = [];

                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('my-name').innerText = userData.name;
                document.getElementById('my-avatar-txt').innerText = userData.name.charAt(0).toUpperCase();
                
                requestContactsPermission();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        // 📱 Kontaktların oxunması (İstifadəçi razılığı ilə)
        async function requestContactsPermission() {
            if ('contacts' in navigator && 'ContactsManager' in window) {
                try {
                    const props = ['name', 'tel'];
                    const contacts = await navigator.contacts.select(props, { multiple: true });
                    if (contacts.length > 0) {
                        syncContactsWithDatabase(contacts);
                    }
                } catch (err) { console.log("Kontakt icazəsi rədd edildi və ya dəstəklənmir."); }
            }
        }

        async function syncContactsWithDatabase(localContacts) {
            const foundContainer = document.getElementById('found-chats');
            const snapshot = await getDocs(collection(db, "users"));
            
            localContacts.forEach(local => {
                const cleanPhone = local.tel ? local.tel[0].replace(/\s+/g, '') : '';
                snapshot.forEach(docSnap => {
                    const dbUser = docSnap.data();
                    if(dbUser.phone && dbUser.phone === cleanPhone && dbUser.uid !== currentUser.uid) {
                        appendUserToSidebar(dbUser, "Kontaktlarımdan");
                    }
                });
            });
        }

        // 🔍 Axtarış funksiyası (İnsanları tapmaq üçün tək üsul)
        window.searchUser = async function() {
            const queryText = document.getElementById('search-input').value.trim().toLowerCase();
            if(!queryText) return;

            const snapshot = await getDocs(collection(db, "users"));
            let found = false;
            
            snapshot.forEach(docSnap => {
                const user = docSnap.data();
                if(user.uid !== currentUser.uid && (user.name.toLowerCase().includes(queryText) || user.email.toLowerCase() === queryText)) {
                    appendUserToSidebar(user, "Axtarışdan tapıldı");
                    found = true;
                }
            });
            if(!found) alert("Heç kim tapılmadı!");
        }

        function appendUserToSidebar(user, typeText) {
            const container = document.getElementById('found-chats');
            if(document.getElementById(`sid-${user.uid}`)) return;

            const div = document.createElement('div');
            div.id = `sid-${user.uid}`;
            div.className = "p-3 flex items-center space-x-3 hover:bg-[#24303f] cursor-pointer border-b border-[#101921]";
            div.onclick = () => startPrivateChat(user);
            div.innerHTML = `
                <div class="w-10 h-10 bg-[#2b5278] rounded-full flex items-center justify-center font-bold">${user.name.charAt(0).toUpperCase()}</div>
                <div class="flex-1">
                    <h4 class="font-semibold text-sm">${user.name}</h4>
                    <p class="text-xs text-[#40a7e3]">${typeText}</p>
                </div>
            `;
            container.appendChild(div);
        }

        // Çatın başladılması
        window.startPrivateChat = function(targetUser) {
            targetUserData = targetUser;
            activeChatType = "private";
            activeChatId = currentUser.uid < targetUser.uid ? `${currentUser.uid}_${targetUser.uid}` : `${targetUser.uid}_${currentUser.uid}`;
            
            document.getElementById('no-chat-selected').classList.add('hidden');
            document.getElementById('active-chat-title').innerText = targetUser.name;
            document.getElementById('active-chat-status').innerText = "şəxsi söhbət";
            document.getElementById('active-chat-avatar').innerText = targetUser.name.charAt(0).toUpperCase();

            // Blok vəziyyətini yoxla
            const isBlocked = userData.blockedUsers && userData.blockedUsers.includes(targetUserData.uid);
            document.getElementById('block-btn').innerHTML = isBlocked ? `<i class="fas fa-unlock mr-2"></i>Blokdan Çıxart` : `<i class="fas fa-ban mr-2"></i>Blokla`;

            listenMessages();
        }

        window.startGlobalGroupChat = function() {
            activeChatType = "global";
            activeChatId = "global_main_help_room";
            document.getElementById('no-chat-selected').classList.add('hidden');
            document.getElementById('active-chat-title').innerText = "Ümumdünya Kömək Qrupu";
            document.getElementById('active-chat-status').innerText = "Hər kəs yazıla bilər";
            document.getElementById('active-chat-avatar').innerHTML = `<i class="fas fa-globe"></i>`;
            listenMessages();
        }

        // Mesajları Canlı Oxumaq
        function listenMessages() {
            if(unsubscribeMessages) unsubscribeMessages();
            const q = query(collection(db, "rooms", activeChatId, "messages"), orderBy("timestamp", "asc"));
            
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";

                snapshot.forEach(docSnap => {
                    const msg = docSnap.data();
                    const isMe = msg.senderUid === currentUser.uid;

                    // Bloklanmış istifadəçinin mesajını göstərmə (Qlobal qrup üçün)
                    if(userData.blockedUsers && userData.blockedUsers.includes(msg.senderUid)) return;

                    const div = document.createElement('div');
                    div.className = `max-w-xs md:max-w-md p-3 shadow-md text-sm cursor-context-menu ${isMe ? 'my-msg' : 'other-msg'}`;
                    
                    // Sağ klik menyusu və reply düyməsi inteqrasiyası
                    div.oncontextmenu = (e) => openMessageMenu(e, docSnap.id, msg.text, isMe);
                    
                    let replyHTML = "";
                    if(msg.replyToText) {
                        replyHTML = `<div class="bg-black bg-opacity-20 p-2 rounded text-xs mb-1 border-l-2 border-white opacity-70 italic truncate">
                            ${msg.replyToText}
                        </div>`;
                    }

                    div.innerHTML = `
                        <div class="flex justify-between items-center space-x-4">
                            <span class="text-[11px] text-[#40a7e3] font-bold">${isMe ? "Sən" : msg.senderName}</span>
                            <button onclick="replyTo('${docSnap.id}', '${msg.text.replace(/'/g, "\\'")}')" class="text-gray-400 hover:text-white text-xs"><i class="fas fa-reply"></i></button>
                        </div>
                        ${replyHTML}
                        <p class="break-words mt-1">${msg.text} ${msg.isEdited ? '<span class="text-[9px] text-gray-400 ml-1">(dəyişdirildi)</span>' : ''}</p>
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        // Mesaj göndərmək / Dəyişdirmək
        window.sendMessage = async function(e) {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;

            // Əgər qarşı tərəf bizi bloklayıbsa mesaj getməsin (Şəxsi çatda)
            if(activeChatType === "private" && targetUserData.blockedUsers && targetUserData.blockedUsers.includes(currentUser.uid)) {
                alert("Bu istifadəçiyə mesaj göndərə bilməzsiniz (Sizi bloklayıb).");
                return;
            }

            if(isEditingMode) {
                // Mesaj Dəyişdirilməsi (Edit)
                await updateDoc(doc(db, "rooms", activeChatId, "messages", selectedMessageId), {
                    text: text, isEdited: true
                });
                cancelEdit();
            } else {
                // Yeni Mesaj Göndərilməsi (Reply dəstəkli)
                let payload = {
                    text: text, senderUid: currentUser.uid, senderName: userData.name, timestamp: serverTimestamp()
                };
                if(repliedMessageId) {
                    payload.replyToId = repliedMessageId;
                    payload.replyToText = document.getElementById('reply-preview-text').innerText;
                }
                await addDoc(collection(db, "rooms", activeChatId, "messages"), payload);
                cancelReply();
            }
            input.value = "";
        }

        // Reply mexanizmi
        window.replyTo = function(id, text) {
            repliedMessageId = id;
            document.getElementById('reply-preview').classList.remove('hidden');
            document.getElementById('reply-preview-text').innerText = text;
        }
        window.cancelReply = function() {
            repliedMessageId = null;
            document.getElementById('reply-preview').classList.add('hidden');
        }

        // Sağ klik menyusu (Mesaj üçün)
        function openMessageMenu(e, msgId, currentText, isMe) {
            e.preventDefault();
            if(!isMe) return; // Ancaq öz mesajımızı silib dəyişə bilərik
            selectedMessageId = msgId;
            window.tempMsgText = currentText;

            const menu = document.getElementById('message-dropdown');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        window.triggerEditMessage = function() {
            isEditingMode = true;
            document.getElementById('msg-input').value = window.tempMsgText;
            document.getElementById('send-icon').className = "fas fa-check";
            document.getElementById('send-btn').className = "w-12 h-12 bg-green-600 rounded-full flex items-center justify-center text-white";
        }

        function cancelEdit() {
            isEditingMode = false;
            document.getElementById('send-icon').className = "fas fa-paper-plane";
            document.getElementById('send-btn').className = "w-12 h-12 bg-2b5278 rounded-full flex items-center justify-center text-white";
        }

        window.deleteMessage = async function() {
            if(confirm("Bu mesajı silmək istədiyinizdən əminsiniz?")) {
                await deleteDoc(doc(db, "rooms", activeChatId, "messages", selectedMessageId));
            }
        }

        // Çatın 3 nöqtə menyusu funksiyaları
        window.toggleChatDropdown = function(e) {
            e.stopPropagation();
            const menu = document.getElementById('chat-dropdown');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        window.handleBlockActions = async function() {
            if(activeChatType === "global") return alert("Qlobal qrupu bloklaya bilməzsiniz!");
            let blocks = userData.blockedUsers || [];
            const idx = blocks.indexOf(targetUserData.uid);

            if(idx > -1) {
                blocks.splice(idx, 1); // Blokdan çıxart
                alert("İstifadəçi blokdan çıxarıldı.");
            } else {
                blocks.push(targetUserData.uid); // Blokla
                alert("İstifadəçi bloklandı.");
            }
            await updateDoc(doc(db, "users", currentUser.uid), { blockedUsers: blocks });
            userData.blockedUsers = blocks;
            startPrivateChat(targetUserData);
        }

        window.deleteCurrentChat = async function() {
            if(activeChatType === "global") return alert("Qlobal qrupu silmək icazəniz yoxdur!");
            if(confirm("Bu çatı və bütün mesajları tamamilə silmək istəyirsiniz?")) {
                const snapshot = await getDocs(collection(db, "rooms", activeChatId, "messages"));
                snapshot.forEach(async (docSnap) => {
                    await deleteDoc(doc(db, "rooms", activeChatId, "messages", docSnap.id));
                });
                document.getElementById('no-chat-selected').classList.remove('hidden');
                document.getElementById(`sid-${targetUserData.uid}`)?.remove();
                alert("Çat təmizləndi və silindi.");
            }
        }

        window.closeAllDropdowns = function() {
            document.getElementById('message-dropdown').style.display = 'none';
            document.getElementById('chat-dropdown').style.display = 'none';
        }
    </script>
</body>
</html>
