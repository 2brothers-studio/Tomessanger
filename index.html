<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomessenger Glass v12.0 Ironclad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%); 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            user-select: none;
            overflow: hidden;
        }

        .liquid-bg {
            position: absolute; width: 500px; height: 500px;
            background: linear-gradient(45deg, #4f46e5, #06b6d4);
            filter: blur(80px); border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: liquidAnimate 15s infinite alternate ease-in-out; z-index: 1; opacity: 0.4;
        }
        .liquid-bg-2 {
            position: absolute; right: 10%; bottom: 10%; width: 400px; height: 400px;
            background: linear-gradient(45deg, #d946ef, #6366f1);
            filter: blur(100px); border-radius: 50%;
            animation: liquidAnimate 20s infinite alternate-reverse ease-in-out; z-index: 1; opacity: 0.3;
        }

        @keyframes liquidAnimate {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: translate(0, 0) rotate(0deg); }
            100% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; transform: translate(50px, 50px) rotate(360deg); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1); border-color: #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .my-msg { 
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.25), rgba(79, 70, 229, 0.25));
            border: 1px solid rgba(255, 255, 255, 0.15); align-self: flex-end; border-radius: 16px 16px 0px 16px; 
        }
        .other-msg { 
            background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.05);
            align-self: flex-start; border-radius: 16px 16px 16px 0px; 
        }

        @media (max-width: 768px) {
            .sidebar-view { width: 100% !important; display: block; }
            .chat-view { width: 100% !important; display: none; position: fixed; inset: 0; z-index: 40; }
            .chat-view.active { display: flex !important; }
            .sidebar-view.hidden-mob { display: none !important; }
        }
        
        .reaction-bar { display: none; position: absolute; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 8px; z-index: 50; gap: 6px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center relative overflow-hidden" onclick="closeAllDropdowns()">

    <div class="liquid-bg"></div>
    <div class="liquid-bg-2"></div>

    <div id="reaction-popup" class="reaction-bar flex shadow-2xl">
        <button onclick="sendReaction('👍')" class="hover:scale-130 transition-transform text-lg">👍</button>
        <button onclick="sendReaction('❤️')" class="hover:scale-130 transition-transform text-lg">❤️</button>
        <button onclick="sendReaction('😂')" class="hover:scale-130 transition-transform text-lg">😂</button>
        <button onclick="sendReaction('😮')" class="hover:scale-130 transition-transform text-lg">😮</button>
        <button onclick="removeReaction()" class="hover:scale-130 transition-transform text-xs text-red-400 font-bold border-l border-white/20 pl-2 ml-1">Sil ❌</button>
    </div>

    <div id="auth-container" class="w-full max-w-md p-8 rounded-2xl glass-panel z-10">
        <h2 id="auth-title" class="text-3xl font-extrabold text-center mb-6 bg-gradient-to-r from-cyan-400 to-indigo-400 bg-clip-text text-transparent">Tomessenger Pro</h2>
        <div class="space-y-4">
            <input type="text" id="auth-name" placeholder="Adınız və Soyadınız" class="w-full p-3 rounded-xl glass-input text-white hidden outline-none">
            <input type="text" id="auth-phone" placeholder="Telefon nömrəniz" class="w-full p-3 rounded-xl glass-input text-white hidden outline-none">
            <input type="email" id="auth-email" placeholder="E-poçt ünvanı" class="w-full p-3 rounded-xl glass-input text-white outline-none">
            <input type="password" id="auth-password" placeholder="Şifrə" class="w-full p-3 rounded-xl glass-input text-white outline-none">
            
            <button id="btn-action" onclick="handleAuth()" class="w-full bg-gradient-to-r from-cyan-500 to-indigo-500 hover:from-cyan-600 hover:to-indigo-600 text-white p-3 rounded-xl font-bold shadow-lg transform active:scale-95 transition-all">Giriş Et</button>
            
            <p class="text-sm text-center text-gray-400 mt-4">
                <span id="auth-switch-text">Hesabınız yoxdur?</span>
                <button onclick="toggleAuthMode()" id="btn-switch" class="text-cyan-400 underline ml-1 font-semibold">Qeydiyyatdan keçin</button>
            </p>
        </div>
    </div>

    <div id="app-container" class="w-full h-screen flex hidden z-10 p-2 md:p-4 space-x-4">
        
        <div id="sidebar-panel" class="sidebar-view w-1/3 glass-panel rounded-2xl flex flex-col h-full overflow-hidden">
            <div class="p-4 flex justify-between items-center border-b border-white/10 bg-white/5">
                <div class="flex items-center space-x-3">
                    <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="uploadAvatar(event)">
                    <div id="my-avatar-container" onclick="document.getElementById('avatar-input').click()" class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-white shadow-md cursor-pointer overflow-hidden relative group bg-gradient-to-tr from-cyan-500 to-indigo-500">
                        <img id="my-avatar-img" class="w-full h-full object-cover hidden" src="">
                        <span id="my-avatar-txt">U</span>
                        <div class="absolute inset-0 bg-black/40 items-center justify-center hidden group-hover:flex text-[9px]">Dəyiş</div>
                    </div>
                    <span class="font-semibold truncate max-w-[140px] cursor-pointer hover:text-cyan-400" id="my-name" onclick="changeMyName()">Yüklənir...</span>
                </div>
                <button onclick="logout()" class="text-gray-400 hover:text-red-400"><i class="fas fa-sign-out-alt text-lg"></i></button>
            </div>
            
            <div class="p-3 border-b border-white/5">
                <div class="relative">
                    <input type="text" id="search-input" oninput="filterUsers()" placeholder="Dostlarını axtar..." class="w-full p-2 pl-9 rounded-xl glass-input text-xs text-white outline-none">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-500 text-xs"></i>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-2 space-y-1" id="chats-list">
                <div onclick="startGlobalGroupChat()" class="p-3 flex items-center space-x-3 rounded-xl hover:bg-white/10 cursor-pointer bg-white/5 border border-white/10">
                    <div class="w-10 h-10 bg-gradient-to-tr from-pink-500 to-orange-400 rounded-full flex items-center justify-center font-bold text-white shadow-sm"><i class="fas fa-globe"></i></div>
                    <div class="flex-1">
                        <h4 class="font-bold text-sm text-white">Ümumdünya Kömək Qrupu</h4>
                        <p class="text-xs text-cyan-300">Açıq otaq</p>
                    </div>
                </div>
                <div id="all-users-list" class="space-y-1"></div>
            </div>
        </div>

        <div id="chat-panel" class="chat-view flex-1 flex flex-col glass-panel rounded-2xl overflow-hidden relative">
            <div id="no-chat-selected" class="absolute inset-0 flex items-center justify-center bg-[#0f172abf] backdrop-blur-md z-20">
                <p class="bg-white/10 px-5 py-2.5 rounded-full text-sm text-gray-300 border border-white/10 shadow-lg">Söhbətə başlamaq üçün çat seçin</p>
            </div>

            <div class="p-4 bg-white/5 flex items-center justify-between border-b border-white/10 z-10">
                <div class="flex items-center">
                    <button onclick="backToSidebar()" class="md:hidden mr-3 text-gray-400"><i class="fas fa-arrow-left text-lg"></i></button>
                    <div id="active-chat-avatar-container" class="w-10 h-10 rounded-full flex items-center justify-center font-bold mr-3 shadow-md text-white bg-cyan-500 overflow-hidden">
                        <img id="active-chat-avatar-img" class="w-full h-full object-cover hidden" src="">
                        <span id="active-chat-avatar-txt">?</span>
                    </div>
                    <div>
                        <h3 class="font-bold text-base text-white" id="active-chat-title">Çat</h3>
                        <p class="text-xs text-cyan-400" id="active-chat-status">Söhbət otağı</p>
                    </div>
                </div>
            </div>

            <div id="messages-container" class="flex-1 p-6 overflow-y-auto flex flex-col space-y-4 z-10"></div>

            <form id="message-form" onsubmit="sendMessage(event)" class="p-4 bg-white/5 flex items-center space-x-2 z-10 border-t border-white/10">
                <input type="file" id="chat-file-input" class="hidden" onchange="handleChatFileSelect(event)">
                <button type="button" onclick="document.getElementById('chat-file-input').click()" class="w-11 h-11 bg-white/5 hover:bg-white/10 text-gray-400 hover:text-cyan-400 rounded-xl flex items-center justify-center border border-white/10">
                    <i class="fas fa-paperclip text-lg"></i>
                </button>

                <input type="text" id="msg-input" oninput="notifyTyping()" placeholder="Mesaj yazın..." autocomplete="off" class="flex-1 p-3 rounded-xl glass-input text-white focus:outline-none">
                
                <button type="button" id="voice-btn" onclick="toggleVoiceRecord()" class="w-11 h-11 bg-white/5 hover:bg-white/10 text-gray-400 hover:text-red-400 rounded-xl flex items-center justify-center border border-white/10">
                    <i class="fas fa-microphone text-lg" id="voice-icon"></i>
                </button>

                <button type="submit" class="w-11 h-11 bg-gradient-to-tr from-cyan-500 to-indigo-500 rounded-xl flex items-center justify-center text-white">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBphHHmIBl0vNONV7XYIrCcSRM0uBTIors",
            authDomain: "tomessanger.firebaseapp.com",
            projectId: "tomessanger",
            storageBucket: "tomessanger.firebasestorage.app",
            messagingSenderId: "542418746391",
            appId: "1:542418746391:web:0bbbb96a1d5bc465dfb052"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isSignUpMode = false;
        let currentUser = null;
        let userData = { name: "", hiddenUsers: [], avatarUrl: "" };
        let activeChatId = null;
        let activeChatType = "private"; 
        let targetUserData = null;
        let unsubscribeMessages = null;
        
        let allUsersMap = {};
        let searchQuery = "";
        let typingTimeout = null;
        
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let selectedMessageIdForReaction = null;

        window.toggleAuthMode = function() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? "Qeydiyyat" : "Tomessenger Pro";
            document.getElementById('auth-name').classList.toggle('hidden', !isSignUpMode);
            document.getElementById('auth-phone').classList.toggle('hidden', !isSignUpMode);
            document.getElementById('btn-action').innerText = isSignUpMode ? "Qeydiyyatı Tamamla" : "Giriş Et";
            document.getElementById('auth-switch-text').innerText = isSignUpMode ? "Hesabınız var?" : "Hesabınız yoxdur?";
            document.getElementById('btn-switch').innerText = isSignUpMode ? "Giriş edin" : "Qeydiyyatdan keçin";
        }

        // 🛡️ KRİTİK ULTIMATE FORCE-LOGIN AYARI (BÜTÜN BUGLAR TƏMİZLƏNDİ)
        window.handleAuth = async function() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const name = document.getElementById('auth-name').value.trim();
            const phone = document.getElementById('auth-phone').value.trim();

            if(!email || !password) return alert("Xanaları doldurun!");

            try {
                if (isSignUpMode) {
                    if(!name) return alert("Ad yazın!");
                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    
                    // Məlumatları Firestore-a yazırıq
                    await setDoc(doc(db, "users", res.user.uid), {
                        uid: res.user.uid, name: name, email: email, phone: phone || "", hiddenUsers: [], avatarUrl: "", status: "online", lastSeen: serverTimestamp()
                    });
                    
                    // 🚀 FORCE ROUTE: Qeydiyyat bitən kimi gözləmədən birbaşa tətbiqi işə salırıq
                    setupAppWithUser(res.user);
                } else {
                    const res = await signInWithEmailAndPassword(auth, email, password);
                    await updateDoc(doc(db, "users", res.user.uid), { status: "online", lastSeen: serverTimestamp() });
                    setupAppWithUser(res.user);
                }
            } catch (e) { 
                if (e.code === "auth/email-already-in-use") {
                    alert("Bu e-poçt artıq qeydiyyatdan keçib! Zəhmət olmasa aşağıdan 'Giriş edin' düyməsinə basaraq daxil olun.");
                } else {
                    alert(e.message); 
                }
            }
        }

        // Proqramın pəncərəsini məcburi açan və dataları sinxronlaşdıran ana funksiya
        function setupAppWithUser(user) {
            currentUser = user;
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            
            // İstifadəçinin öz profil məlumatlarını dinləmək
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if(docSnap.exists()) {
                    userData = { ...userData, ...docSnap.data() };
                    document.getElementById('my-name').innerText = userData.name;
                    updateAvatarUI('my-avatar-img', 'my-avatar-txt', userData.avatarUrl, userData.name);
                }
            });
            loadUsersAndSync();
        }

        window.logout = async () => {
            if(currentUser) await updateDoc(doc(db, "users", currentUser.uid), { status: "offline", lastSeen: serverTimestamp() });
            signOut(auth);
            location.reload(); // təmiz çıxış üçün səhifəni sıfırlayır
        }

        window.changeMyName = async function() {
            const newName = prompt("Yeni adınız:", userData.name);
            if(newName && newName.trim() !== "") {
                await updateDoc(doc(db, "users", currentUser.uid), { name: newName.trim() });
            }
        }

        window.uploadAvatar = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onloadend = async function() {
                await updateDoc(doc(db, "users", currentUser.uid), { avatarUrl: reader.result });
            }
            reader.readAsDataURL(file);
        }

        function updateAvatarUI(imgId, txtId, url, name) {
            const imgEl = document.getElementById(imgId);
            const txtEl = document.getElementById(txtId);
            if(url) {
                imgEl.src = url; imgEl.classList.remove('hidden'); txtEl.classList.add('hidden');
            } else {
                imgEl.classList.add('hidden'); txtEl.innerText = (name || "U").charAt(0).toUpperCase(); txtEl.classList.remove('hidden');
            }
        }

        // Brauzer açılanda əgər session aktivdirsə avtomatik içəri atır
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await updateDoc(doc(db, "users", user.uid), { status: "online", lastSeen: serverTimestamp() });
                setupAppWithUser(user);
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        function formatLastSeen(timestamp) {
            if(!timestamp) return "offline";
            try {
                const date = timestamp.toDate();
                return `Son görülmə: bugun ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
            } catch(e) {
                return "offline";
            }
        }

        async function loadUsersAndSync() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                allUsersMap = {};
                snapshot.forEach(docSnap => { allUsersMap[docSnap.id] = docSnap.data(); });
                renderSidebarList();
                
                if(activeChatId && activeChatType === "private" && targetUserData) {
                    const u = allUsersMap[targetUserData.uid];
                    if(u) {
                        document.getElementById('active-chat-title').innerText = u.name;
                        document.getElementById('active-chat-status').innerText = u.typingTo === currentUser.uid ? "yazır..." : (u.status === "online" ? "Online 🟢" : formatLastSeen(u.lastSeen));
                        updateAvatarUI('active-chat-avatar-img', 'active-chat-avatar-txt', u.avatarUrl, u.name);
                    }
                }
            });
        }

        window.filterUsers = function() {
            searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            renderSidebarList();
        }

        window.hideUserFromList = async function(e, targetUid) {
            e.stopPropagation();
            if(confirm("Bu şəxsi siyahınızdan silmək istəyirsiniz?")) {
                if(!userData.hiddenUsers) userData.hiddenUsers = [];
                userData.hiddenUsers.push(targetUid);
                await updateDoc(doc(db, "users", currentUser.uid), { hiddenUsers: userData.hiddenUsers });
            }
        }

        function renderSidebarList() {
            const container = document.getElementById('all-users-list');
            container.innerHTML = "";

            Object.values(allUsersMap).forEach(user => {
                if(user.uid === currentUser.uid) return;
                if(userData.hiddenUsers && userData.hiddenUsers.includes(user.uid)) return;
                if(searchQuery && !user.name.toLowerCase().includes(searchQuery)) return;

                const isOnline = user.status === "online";
                const isTyping = user.typingTo === currentUser.uid;

                const div = document.createElement('div');
                div.className = "p-3 flex items-center space-x-3 rounded-xl hover:bg-white/10 cursor-pointer relative group";
                div.onclick = () => { startPrivateChat(user); };

                const imgPart = user.avatarUrl ? `<img src="${user.avatarUrl}" class="w-full h-full object-cover">` : `<span>${(user.name || "U").charAt(0).toUpperCase()}</span>`;

                div.innerHTML = `
                    <div class="w-10 h-10 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-full flex items-center justify-center font-bold text-white relative overflow-hidden">
                        ${imgPart}
                        <span class="absolute bottom-0 right-0 w-3 h-3 border-2 border-slate-900 rounded-full ${isOnline ? 'bg-green-400' : 'bg-gray-500'}"></span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-semibold text-sm text-white truncate pr-6">${user.name}</h4>
                        <p class="text-xs ${isTyping ? 'text-green-400 font-bold animate-pulse' : 'text-gray-400'} truncate">
                            ${isTyping ? "yazır..." : (isOnline ? "online" : "offline")}
                        </p>
                    </div>
                    <button onclick="hideUserFromList(event, '${user.uid}')" class="absolute right-3 top-4 text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity p-1 text-xs"><i class="fas fa-times"></i></button>
                `;
                container.appendChild(div);
            });
        }

        window.startPrivateChat = function(targetUser) {
            targetUserData = targetUser; activeChatType = "private";
            activeChatId = currentUser.uid < targetUser.uid ? `${currentUser.uid}_${targetUser.uid}` : `${targetUser.uid}_${currentUser.uid}`;
            
            document.getElementById('chat-panel').classList.add('active');
            document.getElementById('sidebar-panel').classList.add('hidden-mob');
            document.getElementById('no-chat-selected').classList.add('hidden');
            document.getElementById('active-chat-title').innerText = targetUser.name;
            document.getElementById('active-chat-status').innerText = targetUser.status === "online" ? "Online 🟢" : formatLastSeen(targetUser.lastSeen);
            updateAvatarUI('active-chat-avatar-img', 'active-chat-avatar-txt', targetUser.avatarUrl, targetUser.name);
            listenMessages();
        }

        window.startGlobalGroupChat = function() {
            activeChatType = "global"; activeChatId = "global_main_help_room";
            document.getElementById('chat-panel').classList.add('active');
            document.getElementById('sidebar-panel').classList.add('hidden-mob');
            document.getElementById('no-chat-selected').classList.add('hidden');
            document.getElementById('active-chat-title').innerText = "Ümumdünya Kömək Qrupu";
            document.getElementById('active-chat-status').innerText = "Açıq söhbət";
            document.getElementById('active-chat-avatar-container').innerHTML = `<i class="fas fa-globe"></i>`;
            listenMessages();
        }

        function listenMessages() {
            if(!activeChatId) return;
            if(unsubscribeMessages) unsubscribeMessages();
            
            const q = query(collection(db, "rooms", activeChatId, "messages"), orderBy("timestamp", "asc"));
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";

                snapshot.forEach(docSnap => {
                    const msg = docSnap.data();
                    const isMe = msg.senderUid === currentUser.uid;

                    const div = document.createElement('div');
                    div.className = `max-w-xs md:max-w-md p-3 shadow-lg text-sm relative cursor-pointer ${isMe ? 'my-msg' : 'other-msg'}`;
                    div.onclick = (e) => openReactionMenu(e, docSnap.id);
                    
                    let contentHTML = `<p class="break-words">${msg.text}</p>`;
                    if(msg.fileUrl) {
                        if(msg.fileType === "image") contentHTML = `<img src="${msg.fileUrl}" class="rounded-lg max-h-60 object-contain">`;
                        else if(msg.fileType === "video") contentHTML = `<video src="${msg.fileUrl}" controls class="rounded-lg max-h-60"></video>`;
                        else if(msg.fileType === "audio") contentHTML = `<audio src="${msg.fileUrl}" controls class="w-full mt-1"></audio>`;
                        else contentHTML = `<a href="${msg.fileUrl}" download="${msg.text}" class="text-cyan-400 underline"><i class="fas fa-file-download"></i> ${msg.text}</a>`;
                    }

                    let reactionHTML = msg.reaction ? `<span class="absolute -bottom-2 right-2 bg-slate-800 border border-white/10 rounded-full px-1.5 py-0.5 text-xs">${msg.reaction}</span>` : "";

                    div.innerHTML = `<span class="text-[10px] text-cyan-400 font-bold block mb-1">${isMe ? "Sən" : msg.senderName}</span>${contentHTML}${reactionHTML}`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.openReactionMenu = function(e, msgId) {
            e.stopPropagation();
            selectedMessageIdForReaction = msgId;
            const popup = document.getElementById('reaction-popup');
            popup.style.display = 'flex'; popup.style.left = e.pageX + 'px'; popup.style.top = (e.pageY - 40) + 'px';
        }

        window.sendReaction = async function(emoji) {
            if(!selectedMessageIdForReaction) return;
            await updateDoc(doc(db, "rooms", activeChatId, "messages", selectedMessageIdForReaction), { reaction: emoji });
            closeAllDropdowns();
        }

        window.removeReaction = async function() {
            if(!selectedMessageIdForReaction) return;
            await updateDoc(doc(db, "rooms", activeChatId, "messages", selectedMessageIdForReaction), { reaction: null });
            closeAllDropdowns();
        }

        window.toggleVoiceRecord = async function() {
            const icon = document.getElementById('voice-icon');
            if (!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    sendMediaMessage(URL.createObjectURL(audioBlob), "Səsli Mesaj", "audio");
                };
                mediaRecorder.start(); isRecording = true; icon.className = "fas fa-stop text-red-500 animate-pulse";
            } else {
                mediaRecorder.stop(); isRecording = false; icon.className = "fas fa-microphone text-lg";
            }
        }

        window.handleChatFileSelect = function(event) {
            const file = event.target.files[0]; if (!file) return;
            let fileType = file.type.startsWith("image/") ? "image" : (file.type.startsWith("video/") ? "video" : "file");
            sendMediaMessage(URL.createObjectURL(file), file.name, fileType);
        }

        async function sendMediaMessage(url, name, type) {
            await addDoc(collection(db, "rooms", activeChatId, "messages"), {
                text: name, fileUrl: url, fileType: type, senderUid: currentUser.uid, senderName: userData.name, timestamp: serverTimestamp()
            });
        }

        window.sendMessage = async function(e) {
            e.preventDefault();
            const input = document.getElementById('msg-input'); const text = input.value.trim();
            if(!text || !activeChatId) return;
            await addDoc(collection(db, "rooms", activeChatId, "messages"), { text: text, senderUid: currentUser.uid, senderName: userData.name, timestamp: serverTimestamp() });
            updateDoc(doc(db, "users", currentUser.uid), { typingTo: null }); input.value = "";
        }

        window.notifyTyping = function() {
            if(activeChatType !== "private" || !activeChatId) return;
            updateDoc(doc(db, "users", currentUser.uid), { typingTo: targetUserData.uid });
            clearTimeout(typingTimeout); typingTimeout = setTimeout(() => { updateDoc(doc(db, "users", currentUser.uid), { typingTo: null }); }, 2000);
        }

        window.backToSidebar = function() { 
            document.getElementById('chat-panel').classList.remove('active'); 
            document.getElementById('sidebar-panel').classList.remove('hidden-mob');
        }
        window.closeAllDropdowns = function() { document.getElementById('reaction-popup').style.display = 'none'; }
    </script>
</body>
</html>
