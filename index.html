<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomessenger Pro</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Nömrəsiz daxili internet zəngləri üçün kitabxana -->
    <script src="https://unpkg.com"></script>
    <style>
        body { background-color: #0e1621; color: #ffffff; font-family: sans-serif; user-select: none; }
        .tg-bg { background-color: #17212b; }
        .tg-active { background-color: #2b5278; }
        .tg-chat-bg { background-image: url('https://githubusercontent.com'); opacity: 0.95; }
        .my-msg { background-color: #2b5278; align-self: flex-end; border-radius: 12px 12px 0px 12px; position: relative; cursor: context-menu; }
        .other-msg { background-color: #182533; align-self: flex-start; border-radius: 12px 12px 12px 0px; position: relative; }
        .dropdown-menu { display: none; position: absolute; background-color: #17212b; border: 1px solid #101921; z-index: 100; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); }
        .dropdown-menu button { width: 100%; text-align: left; padding: 8px 16px; font-size: 13px; }
        .dropdown-menu button:hover { background-color: #24303f; }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden" onclick="closeAllDropdowns()">

    <!-- 1. GİRİŞ VƏ QEYDİYYAT EKRANI -->
    <div id="auth-container" class="w-full max-w-md p-8 rounded-lg tg-bg shadow-lg z-10">
        <h2 id="auth-title" class="text-2xl font-bold text-center mb-6">Tomessenger Pro</h2>
        <div class="space-y-4">
            <input type="text" id="auth-name" placeholder="Adınız və Soyadınız" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white">
            <input type="text" id="auth-phone" placeholder="Telefon nömrəniz (Məs: +994501234567)" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white">
            <input type="email" id="auth-email" placeholder="E-poçt ünvanı" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white">
            <input type="password" id="auth-password" placeholder="Şifrə" class="w-full p-3 rounded bg-[#24303f] border border-gray-700 text-white">
            <button id="btn-action" onclick="handleAuth()" class="w-full bg-[#2481cc] text-white p-3 rounded font-semibold">Qeydiyyatdan Keç / Giriş Et</button>
            <p class="text-sm text-center text-gray-400 mt-4">
                <span id="auth-switch-text">Hesabınız var?</span>
                <button onclick="toggleAuthMode()" id="btn-switch" class="text-[#40a7e3] underline ml-1">Giriş edin</button>
            </p>
        </div>
    </div>

    <!-- 2. ƏSAS MESSENCER EKRANI -->
    <div id="app-container" class="w-full h-screen flex hidden">
        
        <!-- Sol Panel -->
        <div class="w-1/3 tg-bg border-r border-[#101921] flex flex-col h-full">
            <div class="p-4 flex justify-between items-center border-b border-[#101921]">
                <div class="flex items-center space-x-3">
                    <div id="my-avatar-txt" class="w-10 h-10 bg-[#2b5278] rounded-full flex items-center justify-center font-bold">U</div>
                    <div>
                        <span class="font-medium block truncate max-w-[120px]" id="my-name">Yüklənir...</span>
                        <span class="text-xs text-gray-400 block" id="my-phone-display"></span>
                    </div>
                </div>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500"><i class="fas fa-sign-out-alt text-lg"></i></button>
            </div>
            
            <!-- Axtarış Bölməsi -->
            <div class="p-3 border-b border-[#101921]">
                <div class="relative flex items-center bg-[#24303f] rounded-lg px-3 py-2">
                    <i class="fas fa-search text-gray-400 mr-2 text-sm"></i>
                    <input type="text" id="search-input" placeholder="Ad və ya E-poçt ilə dostunu tap..." class="bg-transparent text-sm text-white w-full focus:outline-none">
                    <button onclick="searchUser()" class="text-xs bg-[#2481cc] px-2 py-1 rounded ml-1">Tap</button>
                </div>
            </div>
            
            <!-- Çat Siyahısı -->
            <div class="flex-1 overflow-y-auto" id="chats-list">
                <div onclick="startGlobalGroupChat()" class="p-3 flex items-center space-x-3 hover:bg-[#24303f] cursor-pointer border-b border-[#101921] bg-[#1a2c3d]">
                    <div class="w-10 h-10 bg-[#e07a5f] rounded-full flex items-center justify-center font-bold text-white"><i class="fas fa-globe"></i></div>
                    <div class="flex-1">
                        <h4 class="font-bold text-sm text-white">Ümumdünya Kömək Qrupu</h4>
                        <p class="text-xs text-gray-400 truncate">Hər kəs üçün açıq dəstək otağı</p>
                    </div>
                </div>
                <div id="found-chats"></div>
            </div>
        </div>

        <!-- Sağ Panel -->
        <div class="flex-1 flex flex-col bg-[#0e1621] relative tg-chat-bg">
            <div id="no-chat-selected" class="absolute inset-0 flex items-center justify-center bg-[#0e1621] z-20">
                <p class="bg-[#182533] px-4 py-2 rounded-full text-sm text-gray-400">Yazışmaq üçün bir çat seçin və ya axtarış edin</p>
            </div>

            <!-- Çat Başlığı Və Düymələr -->
            <div class="p-4 tg-bg flex items-center justify-between border-b border-[#101921] z-10">
                <div class="flex items-center">
                    <div id="active-chat-avatar" class="w-10 h-10 bg-[#40a7e3] rounded-full flex items-center justify-center font-bold mr-3">?</div>
                    <div>
                        <h3 class="font-bold text-base" id="active-chat-title">Çat</h3>
                        <p class="text-xs text-gray-400" id="active-chat-status">onlayn</p>
                    </div>
                </div>
                <div class="flex items-center space-x-2 relative">
                    <button onclick="baslatInternetZengi('audio')" class="text-gray-400 hover:text-green-400 p-2 transition" title="Səsli İnternet Zəngi">
                        <i class="fas fa-phone-alt text-lg"></i>
                    </button>
                    <button onclick="baslatInternetZengi('video')" class="text-gray-400 hover:text-blue-400 p-2 transition" title="Görüntülü İnternet Zəngi">
                        <i class="fas fa-video text-lg"></i>
                    </button>
                    
                    <button onclick="toggleChatDropdown(event)" class="text-gray-400 hover:text-white p-2">
                        <i class="fas fa-ellipsis-v text-lg"></i>
                    </button>
                    <div id="chat-dropdown" class="dropdown-menu right-0 mt-12 w-48">
                        <button onclick="handleBlockActions()" id="block-btn" class="text-yellow-500"><i class="fas fa-ban mr-2"></i>Blokla</button>
                        <button onclick="deleteCurrentChat()" class="text-red-500"><i class="fas fa-trash mr-2"></i>Çatı Sil</button>
                    </div>
                </div>
            </div>

            <!-- Gələn Zəng Bildiriş Paneli -->
            <div id="incoming-call-box" class="hidden absolute top-4 left-1/2 transform -translate-x-1/2 bg-[#182533] border border-green-500 p-4 rounded-lg shadow-2xl z-50 flex items-center space-x-4">
                <div>
                    <p class="text-xs text-green-400 font-bold">GƏLƏN ZƏNG...</p>
                    <p id="caller-name" class="text-sm text-white font-medium">Dostunuz zəng edir</p>
                </div>
                <div class="flex space-x-2">
                    <button onclick="zengiQebulEt()" class="bg-green-600 hover:bg-green-500 text-white px-3 py-1 rounded text-xs font-bold">Cavabla</button>
                    <button onclick="zengiReddEt()" class="bg-red-600 hover:bg-red-500 text-white px-3 py-1 rounded text-xs font-bold">Rədd et</button>
                </div>
            </div>

            <!-- Mesajlar Sahəsi -->
            <div id="messages-container" class="flex-1 p-6 overflow-y-auto flex flex-col space-y-3 z-10"></div>

            <!-- Cavablama / Dəyişdirmə Paneli -->
            <div id="reply-preview" class="px-4 py-2 bg-[#182533] border-l-4 border-[#40a7e3] flex justify-between items-center hidden z-10">
                <div>
                    <p id="reply-title-text" class="text-xs text-[#40a7e3] font-bold">Cavablandırılır:</p>
                    <p id="reply-preview-text" class="text-xs text-gray-400 truncate max-w-md"></p>
                </div>
                <button onclick="cancelReply()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>

            <!-- Mesaj Giriş Paneli -->
            <form id="message-form" onsubmit="sendMessage(event)" class="p-4 tg-bg flex items-center space-x-3 z-10">
                <input type="text" id="msg-input" placeholder="Mesaj yazın..." autocomplete="off" class="flex-1 p-3 rounded-lg bg-[#24303f] text-white focus:outline-none">
                <button type="submit" id="send-btn" class="w-12 h-12 bg-[#2b5278] hover:bg-[#2481cc] rounded-full flex items-center justify-center text-white transition">
                    <i class="fas fa-paper-plane" id="send-icon"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Mesaj üçün Kontekst Menyusu (Dəyişdir / Sil) -->
    <div id="message-dropdown" class="dropdown-menu w-36">
